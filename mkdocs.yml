site_name: CAS Workstation
site_description: Windows-first bootstrap, operations, and architecture for the Coding-Autopilot-System workstation.
site_url: https://ogeonx-ai.github.io/cas-workstation/
repo_url: https://github.com/OgeonX-Ai/cas-workstation
repo_name: OgeonX-Ai/cas-workstation
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
nav:
  - Home: index.md
  - Vision: VISION.md
  - Architecture: architecture.md
  - Support Matrix: support-matrix.md
  - Compliance:
      - Baseline: compliance-baseline.md
      - Gap Register: compliance-gap-register.md
      - Asset Inventory: asset-inventory.md
      - Risk Register: risk-register.md
      - Incident Standard: incident-standard.md
      - BCDR Baseline: bcdr-baseline.md
      - Supply-Chain Baseline: supply-chain-baseline.md
      - Control Matrix: control-matrix.md
  - Operations:
      - Merge Queue: MERGE-QUEUE.md
      - Merge Train Runbook: merge-train-runbook.md
      - Improvement Backlog: improvement-backlog.md
      - Azure Rollout Plan: azure-rollout-plan.md
  - Components:
      - Gemini Nano Integration: gemini-nano.md
  - Delivery:
      - Product Requirements: prd/PRD-loop-engineering.md
      - Technical Specification: specs/SPEC-loop-engineering.md
      - Agent Hierarchy: wiki/Agent-Hierarchy.md
  - ADR:
      - Loop Engineering Ownership: adr/ADR-0001-loop-engineering-ownership.md
