name: Compliance Evidence

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 1"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/compliance.yml"
      - "scripts/capture-access-review.py"
      - "scripts/capture-change-management-evidence.py"
      - "scripts/capture-bcdr-evidence.py"
      - "scripts/capture-data-classification-evidence.py"
      - "scripts/capture-provenance-evidence.py"
      - "scripts/capture-incident-management-evidence.py"
      - "scripts/capture-supplier-governance-evidence.py"
      - "scripts/capture-supply-chain-state.py"
      - "scripts/capture-vulnerability-management-evidence.py"
      - "scripts/capture-release-evidence.py"
      - "scripts/capture-sbom-evidence.py"
      - "scripts/hydrate-portfolio-repos.py"
      - "scripts/verify-portfolio-compliance.py"
      - "evidence/compliance/**"
      - "docs/**"

permissions:
  contents: read
  attestations: write
  id-token: write
  artifact-metadata: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      attestations: write
      id-token: write
      artifact-metadata: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      - name: Hydrate portfolio source tree
        run: python scripts/hydrate-portfolio-repos.py

      - name: Capture access review snapshot
        run: python scripts/capture-access-review.py

      - name: Capture change-management snapshot
        run: python scripts/capture-change-management-evidence.py

      - name: Capture BCDR objectives snapshot
        run: python scripts/capture-bcdr-evidence.py

      - name: Capture data-classification snapshot
        run: python scripts/capture-data-classification-evidence.py

      - name: Capture provenance snapshot
        run: python scripts/capture-provenance-evidence.py

      - name: Capture incident-management snapshot
        run: python scripts/capture-incident-management-evidence.py

      - name: Capture supplier-governance snapshot
        run: python scripts/capture-supplier-governance-evidence.py

      - name: Capture supply-chain snapshot
        run: python scripts/capture-supply-chain-state.py

      - name: Capture vulnerability-management snapshot
        run: python scripts/capture-vulnerability-management-evidence.py

      - name: Capture release evidence snapshot
        run: python scripts/capture-release-evidence.py

      - name: Capture SBOM evidence snapshot
        run: python scripts/capture-sbom-evidence.py

      - name: Run compliance verifier
        env:
          ALLOW_SKIPPED_SBOM_TARGETS: "1"
          SKIP_REMOTE_ATTESTATION_VERIFY: "1"
        run: python scripts/verify-portfolio-compliance.py

      - name: Create compliance evidence bundle
        run: |
          tar -czf "compliance-evidence-${GITHUB_SHA}.tar.gz" evidence/compliance
          sha256sum "compliance-evidence-${GITHUB_SHA}.tar.gz" | tee "evidence/compliance/snapshots/compliance-evidence-${GITHUB_SHA}.sha256"

      - name: Attest compliance evidence bundle
        id: attest
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: "compliance-evidence-${{ github.sha }}.tar.gz"

      - name: Verify current run attestation
        run: |
          gh attestation verify "compliance-evidence-${GITHUB_SHA}.tar.gz" \
            --repo OgeonX-Ai/cas-workstation \
            --signer-workflow OgeonX-Ai/cas-workstation/.github/workflows/compliance.yml \
            --source-ref "${GITHUB_REF}"

      - name: Publish compliance evidence directory
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compliance-evidence
          path: evidence/compliance/

      - name: Publish compliance evidence bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compliance-evidence-bundle
          path: compliance-evidence-${{ github.sha }}.tar.gz

      - name: Publish compliance attestation bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: compliance-attestation-bundle
          path: ${{ steps.attest.outputs.bundle-path }}

      - name: Write compliance attestation summary
        run: |
          {
            echo "## Compliance Attestation"
            echo
            echo "- Artifact: \`compliance-evidence-${GITHUB_SHA}.tar.gz\`"
            echo "- Attestation: ${{ steps.attest.outputs.attestation-url }}"
            echo "- Bundle artifact: \`compliance-attestation-bundle\`"
          } >> "$GITHUB_STEP_SUMMARY"
